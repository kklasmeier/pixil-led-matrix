[pytest]
# Automated tests live under tests/ — never imported by Pixil at runtime.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    pixil: Pixil interpreter and pixil_utils (no LED hardware)
    hardware: Requires rgbmatrix module and/or LED matrix hardware
    scripts: Full Pixil.py script execution (use ./run test-scripts instead)
